# Doxyfile Chinese override
# Inherits all settings from Doxyfile, overrides for Chinese API docs
@INCLUDE = Doxyfile

# Enable Chinese section in bilingual comments
ENABLED_SECTIONS       = CHINESE

# Output language for doxygen-generated constant text
OUTPUT_LANGUAGE         = Chinese

# HTML output subdirectory (relative to OUTPUT_DIRECTORY)
HTML_OUTPUT            = doxygen_cn

# Project name for Chinese docs
PROJECT_NAME           = "QWT API (中文)"

# Brief description
PROJECT_BRIEF          = "Qt绘图库 - 中文API文档"

# Main page markdown file for Chinese
USE_MDFILE_AS_MAINPAGE = ../index_cn.md