# Doxyfile English override
# Inherits all settings from Doxyfile, overrides for English API docs
@INCLUDE = Doxyfile

# Enable English section in bilingual comments
ENABLED_SECTIONS       = ENGLISH

# Output language for doxygen-generated constant text
OUTPUT_LANGUAGE         = English

# HTML output subdirectory (relative to OUTPUT_DIRECTORY)
HTML_OUTPUT            = doxygen_en

# Project name for English docs
PROJECT_NAME           = "QWT API (English)"

# Brief description
PROJECT_BRIEF          = "Qt Widget Library for Technical Applications - English API Documentation"

# Main page markdown file for English
USE_MDFILE_AS_MAINPAGE = ../index_en.md