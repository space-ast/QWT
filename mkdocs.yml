site_name: QWT - Qt Plotting Library
site_author: 'Chen ZongYan'
site_url: https://czyt1988.github.io/QWT
repo_url: https://github.com/czyt1988/QWT

# Multilingual site info
extra:
  site_name:
    en: QWT - Qt Plotting Library
    zh: QWT - Qt绘图库
  site_description:
    en: QWT is a powerful Qt plotting library that provides rich scientific and engineering chart drawing capabilities
    zh: QWT是一个功能强大的Qt绘图库，提供丰富的科学和工程图表绘制功能
  alternate:
    - name: English
      link: /QWT/
      lang: en
    - name: 中文
      link: /QWT/zh/
      lang: zh

# Theme
theme:
  name: material
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

# Plugins
plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
          nav:
            - Home: index.md
            - Getting Started:
                - Overview:
                    - Qwt Introduction: introduction.md
                    - Qwt 7.0 New Features: use-guide/qwt7-new-features.md
                - Build Guide:
                    - Build Instructions: build-guide/build-instructions.md
                    - Qmake Single-File Build: build-guide/qmake-single-file.md
                - Development Guide:
                    - Dev Guide Home: dev-guide/index.md
                    - Coding Standards: dev-guide/coding-standards.md
                    - Comment Standards: dev-guide/comment-standards.md
                    - PIMPL Pattern: dev-guide/pimpl-pattern.md
                    - Doc Writing Guide: doc-writing-guide.md
            - User Guide:
                - Basic Usage:
                    - Import Qwt: use-guide/import-qwt.md
                    - First Plot: use-guide/first-plot.md
                    - Picker State Machine: use-guide/picker-state-machine.md
                - Plot Container & Layout:
                    - Figure Widget: use-guide/figure-widget.md
                    - Parasite Axes: use-guide/parasite-axes.md
                    - Plot Layout: use-guide/plot-layout.md
                - Data Processing:
                    - Series Data: use-guide/series-data.md
                    - NaN Handling: use-guide/nan-handling.md
                - Styles & Symbols:
                    - Symbol: use-guide/symbol.md
                - Utility Classes:
                    - Plot Utilities: use-guide/plot-utilities.md
                    - PyPlot API: use-guide/pyplot-api.md
            - Charts:
                - Core Plot Items:
                    - Curve: use-guide/curve.md
                    - Curve Downsampling: use-guide/curve-downsampling.md
                    - Scatter: use-guide/scatter.md
                    - Grid: use-guide/grid.md
                    - Marker: use-guide/marker.md
                    - Arrow Marker: use-guide/arrow-marker.md
                    - Bar Chart: use-guide/barchart.md
                    - Box Chart: use-guide/boxchart.md
                    - Histogram: use-guide/histogram.md
                    - Spectrogram: use-guide/spectrogram.md
                    - Trading Curve: use-guide/tradingcurve.md
                    - Vector Field: use-guide/vectorfield.md
                    - Interval Curve: use-guide/intervalcurve.md
                    - Shape Item: use-guide/shapeitem.md
                    - Text Label: use-guide/textlabel.md
                - Polar Plot:
                    - Polar Plot: use-guide/polar-plot.md
                - 3D Plot:
                    - 3D Plot Introduction: use-guide/3d-plot.md
                    - OpenGL Canvas: use-guide/opengl.md
                - Control Widgets:
                    - Widgets & Controls: use-guide/widgets-controls.md
            - Interaction:
                - Plot Interaction:
                    - Scale Built-in Action: use-guide/scale-builtin-action.md
                    - Pick Value: use-guide/pick-value.md
                    - Panner: use-guide/panner.md
                    - Zoomer: use-guide/zoomer.md
                    - Renderer: use-guide/renderer.md
                - Axis System:
                    - Scale Widget: use-guide/scale-widget.md
                    - Ticks Inside: use-guide/ticks-inside.md
