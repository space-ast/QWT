site_name: QWT - Qt Plotting Library
site_author: 'Chen ZongYan'
site_url: https://czyt1988.github.io/QWT
repo_url: https://github.com/czyt1988/QWT

# Multilingual site info
extra:
  site_name:
    en: QWT - Qt Plotting Library
    zh: QWT - Qt绘图库
  site_description:
    en: QWT is a powerful Qt plotting library that provides rich scientific and engineering chart drawing capabilities
    zh: QWT是一个功能强大的Qt绘图库，提供丰富的科学和工程图表绘制功能
  alternate:
    - name: English
      link: /QWT/
      lang: en
    - name: 中文
      link: /QWT/zh/
      lang: zh

# Theme
theme:
  name: material
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

# Plugins
plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
          nav:
            - Home: index.md
            - Getting Started:
                - Overview:
                    - Qwt Introduction: en/use-guide/qwt7-new-features.md
                - Build Guide:
                    - Build Instructions: en/build-guide/build-instructions.md
                - Development Guide:
                    - Dev Guide Home: en/dev-guide/index.md
                    - Coding Standards: en/dev-guide/coding-standards.md
                    - Comment Standards: en/dev-guide/comment-standards.md
                    - PIMPL Pattern: en/dev-guide/pimpl-pattern.md
                    - Doc Writing Guide: en/doc-writing-guide.md
            - User Guide:
                - Basic Usage:
                    - Import Qwt: en/use-guide/import-qwt.md
                    - First Plot: en/use-guide/first-plot.md
                    - Picker State Machine: en/use-guide/picker-state-machine.md
                - Plot Container & Layout:
                    - Figure Widget: en/use-guide/figure-widget.md
                    - Parasite Axes: en/use-guide/parasite-axes.md
                    - Plot Layout: en/use-guide/plot-layout.md
                - Data Processing:
                    - Series Data: en/use-guide/series-data.md
                - Styles & Symbols:
                    - Symbol: en/use-guide/symbol.md
                - Utility Classes:
                    - Plot Utilities: en/use-guide/plot-utilities.md
            - Charts:
                - Core Plot Items:
                    - Curve: en/use-guide/curve.md
                    - Curve Downsampling: en/use-guide/curve-downsampling.md
                    - Scatter: en/use-guide/scatter.md
                    - Grid: en/use-guide/grid.md
                    - Marker: en/use-guide/marker.md
                    - Arrow Marker: en/use-guide/arrow-marker.md
                    - Bar Chart: en/use-guide/barchart.md
                    - Box Chart: en/use-guide/boxchart.md
                    - Histogram: en/use-guide/histogram.md
                    - Spectrogram: en/use-guide/spectrogram.md
                    - Trading Curve: en/use-guide/tradingcurve.md
                    - Vector Field: en/use-guide/vectorfield.md
                    - Interval Curve: en/use-guide/intervalcurve.md
                    - Shape Item: en/use-guide/shapeitem.md
                    - Text Label: en/use-guide/textlabel.md
                - Polar Plot:
                    - Polar Plot: en/use-guide/polar-plot.md
                - 3D Plot:
                    - 3D Plot Introduction: en/use-guide/3d-plot.md
                    - OpenGL Canvas: en/use-guide/opengl.md
                - Control Widgets:
